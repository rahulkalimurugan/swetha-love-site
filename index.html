<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Cutie ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', sans-serif;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* SECTION */
.section {
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  scroll-snap-align: start;
}

/* TEXT */
.container {
  z-index: 3;
  max-width: 700px;
  padding: 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.section.show .container {
  opacity: 1;
  transform: translateY(0);
}

h1 { font-size: 2.5em; }
p { font-size: 1.2em; }

/* BACKGROUND */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.5);
  z-index: 1;
}

.fade {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, black, transparent);
  z-index: 2;
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  bottom: -20px;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear;
  z-index: 10;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 20;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 14px;
}

/* COUNTER */
.counter {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 20;
  font-size: 14px;
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  border-radius: 15px;
}

/* SECRET BUTTON */
.secret-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 20;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: rgba(255,0,100,0.6);
  color: white;
}
</style>
</head>

<body>

<div class="counter" id="counter">Loading...</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">Play ❤️</button>
<button class="secret-btn" onclick="checkPassword()">Secret ❤️</button>

<!-- ❤️ INTRO -->
<section class="section">
  <img src="https://picsum.photos/1080/1920?1" class="bg">
  <div class="fade"></div>
  <div class="container">
    <h1>Hey cutie ❤️</h1>
    <p>You’re my queen. Always have been.</p>
  </div>
</section>

<!-- ADD YOUR OTHER SECTIONS HERE (same as before) -->

<script>
/* SCROLL ANIMATION */
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.8;
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top < trigger) {
      sec.classList.add('show');
    }
  });
});

/* MUSIC */
const music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    document.querySelector(".music-btn").innerText = "Pause ❤️";
  } else {
    music.pause();
    document.querySelector(".music-btn").innerText = "Play ❤️";
  }
  playing = !playing;
}

/* HEARTS FIXED */
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 600);

/* COUNTER FIXED */
const startDate = new Date("2025-12-01"); // CHANGE THIS

function updateCounter() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;

  document.getElementById("counter").innerText =
    days + " days " + hours + " hrs with you ❤️";
}

updateCounter();
setInterval(updateCounter, 1000);

/* SECRET PAGE */
function checkPassword() {
  let pass = prompt("Enter password ❤️");
  if (pass === "cutie123") {
    window.location.href = "secret.html";
  } else {
    alert("Wrong password 😭");
  }
}
</script>

</body>
</html>
