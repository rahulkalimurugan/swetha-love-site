<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Only for you ❤️</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:'Helvetica Neue',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(255,0,100,0.3);
  max-width:500px;
}

h1 {margin-bottom:20px;}
p {line-height:1.6;}
</style>
</head>

<body>

<div class="card">
<h1>For my cutie ❤️</h1>

<p>
If you’re here… you found the hidden part of my heart.<br><br>

I don’t say this enough…<br>
but you mean everything to me.<br><br>

Every memory… every laugh… every moment with you…<br>
I carry it with me always.<br><br>

And no matter what…<br>
I’ll always choose you.<br><br>

I love you ❤️
</p>
</div>

</body>
</html>
